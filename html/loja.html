<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Lions Guitars - Loja</title>
    <link rel="stylesheet" href="../css/loja.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <a href="#">
                <img src="../img/Gemini_Generated_Image_kw99mhkw99mhkw99-removebg-preview.png" alt="Lions Guitars"
                    class="logo-img">
            </a>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="../html/index.html">Home</a></li>
                <li><a href="../html/NossasCustomizacoes.html">Customizações</a></li>
                <li><a href="../html/loja.html">Produtos</a></li>
                <li><a href="../html/texte.html">Custom</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <h1 class="testep">Nossos Produtos</h1>

        <div class="container">
            <div class="card">
                <div class="img-wrapper">
                    <img src="../img/WarlockGuitar.png" alt="Warlock">
                </div>
                <div class="info">
                    <h2>Warlock</h2>
                    <p class="descricao">Uma guitarra agressiva e poderosa para o seu som.</p>
                    <p class="preco">R$ 15.000</p>
                    <button class="btn" onclick="comprar()">Comprar</button>
                </div>
            </div>

            <div class="card">
                <div class="img-wrapper">
                    <img src="../img/LesPaulSlash.png" alt="Les Paul">
                </div>
                <div class="info">
                    <h2>Les Paul</h2>
                    <p class="descricao">O clássico absoluto com timbres quentes e definidos.</p>
                    <p class="preco">R$ 22.000</p>
                    <button class="btn" onclick="comprar()">Comprar</button>
                </div>
            </div>

            <div class="card">
                <div class="img-wrapper">
                    <img src="../img/FlynigVBlack.png" alt="Flying V">
                </div>
                <div class="info">
                    <h2>Flying V</h2>
                    <p class="descricao">Design icônico e performance de palco impecável.</p>
                    <p class="preco">R$ 18.500</p>
                    <button class="btn" onclick="comprar()">Comprar</button>
                </div>
            </div>
        </div>
    </main>

</body>

</html>

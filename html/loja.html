<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Card Produto</title>
    <link rel="stylesheet" href="../css/loja.css">
</head>
<body>

    <p class="testep">Nossos Produtos</p>

    <div class="container">

        <div class="card">
            <img src="../img/WarlockGuitar.png" alt="Warlock">
            <div class="info">
                <h2>Warlock</h2>
                <p class="descricao">Uma guitarra agressiva e poderosa para o seu som.</p>
                <p class="preco">R$ 199,90</p>
                <button class="btn" onclick="comprar()">Comprar</button>
            </div>
        </div>

        <div class="card">
            <img src="../img/LesPaulSlash.png" alt="Les Paul">
            <div class="info">
                <h2>Les Paul</h2>
                <p class="descricao">O clássico absoluto com timbres quentes e definidos.</p>
                <p class="preco">R$ 199,90</p>
                <button class="btn" onclick="comprar()">Comprar</button>
            </div>
        </div>

        <div class="card">
            <img src="../img/FlynigVBlack.png" alt="Flying V">
            <div class="info">
                <h2>Flying V</h2>
                <p class="descricao">Design icônico e performance de palco impecável.</p>
                <p class="preco">R$ 199,90</p>
                <button class="btn" onclick="comprar()">Comprar</button>
            </div>
        </div>

    </div> </body>
</html>
